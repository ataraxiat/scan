<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Scan Document</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --border: #2a2a32;
      --accent: #e8f04a;
      --accent-dim: rgba(232, 240, 74, 0.12);
      --text: #f0f0f0;
      --muted: #888;
      --radius: 16px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(232, 240, 74, 0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(100, 180, 255, 0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 48px 40px 44px;
      width: min(360px, calc(100vw - 40px));
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.5);
    }

    .icon-ring {
      width: 80px;
      height: 80px;
      background: var(--accent-dim);
      border: 1.5px solid rgba(232, 240, 74, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232, 240, 74, 0.15); }
      50%       { box-shadow: 0 0 0 14px rgba(232, 240, 74, 0); }
    }

    .icon-ring svg {
      width: 36px;
      height: 36px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 8px;
      color: var(--text);
    }

    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 36px;
    }

    /* Hidden real input */
    #fileInput {
      display: none;
    }

    .scan-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 24px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .scan-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .scan-btn svg {
      width: 20px;
      height: 20px;
      stroke: #111;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Status area */
    .status {
      margin-top: 28px;
      min-height: 40px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .status.visible { opacity: 1; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(232, 240, 74, 0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .checkmark {
      width: 16px;
      height: 16px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="icon-ring">
    <!-- Viewfinder / scan icon -->
    <svg viewBox="0 0 24 24">
      <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
      <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
      <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
      <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
      <rect x="7" y="7" width="10" height="10" rx="1"/>
    </svg>
  </div>

  <h1>Scan Document</h1>
  <p>Tap below to open the document scanner.<br/>The scanned PDF will be sent back to your shortcut automatically.</p>

  <!-- accept=application/pdf triggers iOS doc scanner -->
  <input
    type="file"
    id="fileInput"
    accept="application/pdf,image/*"
  />

  <button class="scan-btn" onclick="document.getElementById('fileInput').click()">
    <svg viewBox="0 0 24 24">
      <polyline points="16 16 12 12 8 16"/>
      <line x1="12" y1="12" x2="12" y2="21"/>
      <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
    </svg>
    Open Scanner
  </button>

  <div class="status" id="status">
    <!-- populated by JS -->
  </div>
</div>

<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────
  // The x-callback-url shortcut name that will RECEIVE the scanned file.
  // Change this to match the exact name of your "Receive Scan" shortcut.
  const RECEIVER_SHORTCUT = "OCR_Scan";
  // ─────────────────────────────────────────────────────────────────────

  const input  = document.getElementById("fileInput");
  const status = document.getElementById("status");

  function showStatus(icon, message) {
    status.innerHTML = icon + `<span>${message}</span>`;
    status.classList.add("visible");
  }

  input.addEventListener("change", async () => {
    const file = input.files[0];
    if (!file) return;

    showStatus('<div class="spinner"></div>', "Processing scan…");

    try {
      const base64 = await toBase64(file);

      showStatus('<div class="spinner"></div>', "Sending to Shortcuts…");

      // Build the x-callback-url.
      // The base64 data is passed as the "scan" parameter.
      // The receiving shortcut should accept a Text input named "scan".
      const params = new URLSearchParams({
        name: RECEIVER_SHORTCUT,
        "x-success": window.location.href,   // return here on success (optional)
        scan: base64,
        filename: file.name || "scan.pdf",
        mimetype: file.type || "application/pdf"
      });

      const url = `shortcuts://x-callback-url/run-shortcut?${params.toString()}`;

      showStatus(
        '<svg class="checkmark" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
        "Opening Shortcuts…"
      );

      // Small delay so the user sees the confirmation before the app switch
      setTimeout(() => { window.location.href = url; }, 600);

    } catch (err) {
      showStatus("⚠️", "Error: " + err.message);
    }
  });

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(",")[1]); // strip data: prefix
      reader.onerror = () => reject(new Error("Failed to read file"));
      reader.readAsDataURL(file);
    });
  }
</script>

</body>
</html>
